<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>diri</title>
  <style>
    html, body { margin: 0; padding: 0; background: transparent !important; overflow: hidden; }
    #root { width: 100%; height: 100%; background: transparent !important; }
  </style>
  <script>
    window.addEventListener('error', function(e) {
      if (window.diriAPI) window.diriAPI.sendRendererError('FLOAT_LOAD: ' + e.message + ' ' + (e.filename||'') + ':' + (e.lineno||''));
    });
  </script>
</head>
<body style="background: transparent !important;">
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
